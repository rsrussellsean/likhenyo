        - generic [ref=e50]:
          - heading "Resilient • No flaky tests" [level=3] [ref=e51]
          - generic [ref=e52]:
            - paragraph [ref=e53]: Auto-wait. Playwright waits for elements to be actionable prior to performing actions. It also has a rich set of introspection events. The combination of the two eliminates the need for artificial timeouts - the primary cause of flaky tests.
            - paragraph [ref=e54]: Web-first assertions. Playwright assertions are created specifically for the dynamic web. Checks are automatically retried until the necessary conditions are met.
            - paragraph [ref=e55]: Tracing. Configure test retry strategy, capture execution trace, videos, screenshots to eliminate flakes.
        - generic [ref=e56]:
          - heading "No trade-offs • No limits" [level=3] [ref=e57]
          - generic [ref=e58]:
            - paragraph [ref=e59]: Browsers run web content belonging to different origins in different processes. Playwright is aligned with the modern browsers architecture and runs tests out-of-process. This makes Playwright free of the typical in-process test runner limitations.
            - paragraph [ref=e60]: Multiple everything. Test scenarios that span multiple tabs, multiple origins and multiple users. Create scenarios with different contexts for different users and run them against your server, all in one test.
            - paragraph [ref=e61]: Trusted events. Hover elements, interact with dynamic controls, produce trusted events. Playwright uses real browser input pipeline indistinguishable from the real user.
            - paragraph [ref=e62]: Test frames, pierce Shadow DOM. Playwright selectors pierce shadow DOM and allow entering frames seamlessly.
        - generic [ref=e63]:
          - heading [level=3]
        - generic [ref=e64]:
          - heading [level=3]
        - generic [ref=e65]:
          - heading "Full isolation • Fast execution" [level=3] [ref=e66]
          - generic [ref=e67]:
            - paragraph [ref=e68]: Browser contexts. Playwright creates a browser context for each test. Browser context is equivalent to a brand new browser profile. This delivers full test isolation with zero overhead. Creating a new browser context only takes a handful of milliseconds.
            - paragraph [ref=e69]: Log in once. Save the authentication state of the context and reuse it in all the tests. This bypasses repetitive log-in operations in each test, yet delivers full isolation of independent tests.
